{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopNow</title>
    
    <!-- Static Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
</head>
<body>
    <div class="">
    <!-- Brand Logo -->
    <nav id="mainNav">
    <div class="container">
    <div class="d-flex align-items-center gap-4 py-3">

      <!-- Brand -->
        <a class="navbar-brand d-flex align-items-center" href="/">
            <i class="bi bi-shop" style="font-size: 2rem;"></i>
            <a href="/" class="nav-brand me-2">Shop<span>Now</span></a>
        </a>
  

      <!-- Search -->
      <form method="GET" action="{% url 'searchfilter' %}"  class="nav-search-wrap d-none d-md-block">
        <input type="text" name="query" placeholder="Search fruits, groceries…" value="{{ request.GET.query }}"/>
        <button type="submit"><i class="bi bi-search"></i></button>
      </form>

      <!-- Spacer -->
      <div class="flex-grow-1 d-none d-lg-block"></div>

      <!-- Icons -->
      <div class="d-flex align-items-center gap-1 ms-auto">

        {% if user.is_authenticated %}
        <a href="profile" class="nav-icon-btn" title="My Account">
          <i class="bi bi-person-circle"></i>
          <span>{{ user.username|truncatechars:8 }}</span>
        </a>
        <a href="orders" class="nav-icon-btn" title="My Orders">
          <i class="bi bi-box-seam"></i>
          <span>Orders</span>
        </a>
        <a href="logout" class="nav-icon-btn" title="Logout">
          <i class="bi bi-box-arrow-right"></i>
          <span>Logout</span>
        </a>
        {% else %}
        <a href="login" class="nav-icon-btn" title="Login">
          <i class="bi bi-person"></i>
          <span>Login</span>
        </a>
        <a href="register" class="nav-icon-btn" title="Register">
          <i class="bi bi-person-plus"></i>
          <span>Sign Up</span>
        </a>
        {% endif %}

        <!-- Cart button -->
        <a href="cart" class="nav-icon-btn" title="Cart">
          <i class="bi bi-bag"></i>
          <span>Cart</span>
        </a>
      </div>
    </div>
  </div>
</nav>
</div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="{% static 'js/app.js' %}"></script>
    
</body>
</html>
