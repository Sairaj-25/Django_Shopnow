name: Shopnow CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # JOB 1: Fast Static Analysis & Security

  lint-and-security:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Quality Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black bandit pip-audit

      - name: Check Code Formatting (Black)
        run: black --check .

      - name: Lint Code (Flake8)
        # Uncommented and configured to strictly check for syntax errors and undefined names
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Security Scan (Bandit)
        run: bandit -r . -ll -ii -x "venv,env,tests"

      - name: Dependency Vulnerability Scan
        run: pip-audit


  # JOB 2: Database Setup & Django Testing

  test:
    name: Run Django Tests
    needs: lint-and-security # Ensures this heavy job only runs if the code is clean
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SECRET_KEY: "very-long-random-secret-key-with-50+characters-123456"
      DB_NAME: test_db
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      PYTHONUNBUFFERED: 1
      CI: "True"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install System Dependencies
        # Required to compile mysqlclient
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libmysqlclient-dev default-mysql-client

      - name: Wait for MySQL Service
        run: |
          until mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; do
            echo "Waiting for MySQL container to be ready..."
            sleep 2
          done

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Django Deploy Check
        run: python manage.py check --deploy

      - name: Verify Collectstatic
        run: python manage.py collectstatic --noinput --dry-run

      - name: Enforce Migrations Commits
        # Fails the pipeline if you altered models but forgot to commit the migration files
        run: python manage.py makemigrations --check --dry-run

      - name: Run Migrations
        run: python manage.py migrate --noinput

      - name: Run Tests with Coverage
        run: |
          coverage run manage.py test
          coverage report -m
          coverage xml

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14